<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- ground tile: dark plate with subtle circuit traces -->
  <rect width="64" height="64" fill="#1a2028"/>
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#242c37" stroke-width="2"/>
  <!-- circuit traces -->
  <g stroke="#26303d" stroke-width="2" fill="none" stroke-linecap="square">
    <path d="M8 16 H26 V34"/>
    <path d="M56 12 H40 V26 H30"/>
    <path d="M14 52 H34 V44 H50"/>
    <path d="M54 56 V40"/>
  </g>
  <!-- solder points -->
  <g fill="#31405280">
    <circle cx="26" cy="34" r="2.5" fill="#314052"/>
    <circle cx="30" cy="26" r="2.5" fill="#314052"/>
    <circle cx="50" cy="44" r="2.5" fill="#314052"/>
    <circle cx="8" cy="16" r="2.5" fill="#314052"/>
    <circle cx="54" cy="40" r="2.5" fill="#314052"/>
  </g>
  <!-- corner rivets -->
  <g fill="#242c37">
    <circle cx="6" cy="6" r="2"/>
    <circle cx="58" cy="6" r="2"/>
    <circle cx="6" cy="58" r="2"/>
    <circle cx="58" cy="58" r="2"/>
  </g>
</svg>
