<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- stone: a pale workable outcrop (docs/03: plentiful, feeds walls and
       civil works) — lighter than the mountain, flatter than the mesa;
       edges stay base-colored so tiling is seamless -->
  <rect width="64" height="64" fill="#7b7e85"/>
  <!-- exposed slabs -->
  <path d="M8 12 Q18 6 25 13 Q27 22 16 24 Q7 22 8 12 Z" fill="#8f929a"/>
  <path d="M36 36 Q49 31 54 39 Q53 48 42 48 Q34 43 36 36 Z" fill="#8f929a"/>
  <path d="M34 8 Q44 4 48 11 Q47 18 38 18 Q32 14 34 8 Z" fill="#70737a"/>
  <path d="M12 44 Q21 40 26 46 Q25 54 16 54 Q9 51 12 44 Z" fill="#70737a"/>
  <!-- slab joints -->
  <g stroke="#5f626a" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M16 30 L22 34 L20 42"/>
    <path d="M46 16 L42 24 L46 28"/>
    <path d="M30 52 L36 56"/>
    <path d="M54 50 L58 46"/>
  </g>
  <!-- chips and cobbles -->
  <g fill="#9a9da5">
    <circle cx="28" cy="26" r="1.5"/>
    <circle cx="52" cy="24" r="1.3"/>
    <circle cx="10" cy="34" r="1.2"/>
  </g>
  <g fill="#65686f">
    <ellipse cx="32" cy="44" rx="2.2" ry="1.4"/>
    <ellipse cx="56" cy="58" rx="1.8" ry="1.2"/>
    <ellipse cx="20" cy="8" rx="1.6" ry="1.1"/>
  </g>
</svg>
