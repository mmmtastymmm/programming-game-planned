  <path d="M0 0 H64 V2.5 Q50 5.5 36 3 Q22 0.5 10 4 Q4 5.5 0 2.5 Z" fill="#e3d3a3"/>
  <g fill="#c2a86b">
    <circle cx="14" cy="9.5" r="1.1"/>
    <circle cx="40" cy="10" r="1.0"/>
    <circle cx="56" cy="8.5" r="1.1"/>
  </g>
</svg>
