<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- tin vein: thin, sparse pale seams (docs/03: prospect wide — copper
       is everywhere, its alloy partner isn't). Deliberately stingier art
       than the other veins; edges stay base-colored so tiling is
       seamless -->
  <rect width="64" height="64" fill="#58524a"/>
  <path d="M8 10 Q18 5 24 12 Q26 20 16 22 Q7 20 8 10 Z" fill="#4f4a42"/>
  <path d="M40 40 Q52 36 56 44 Q54 52 44 52 Q38 46 40 40 Z" fill="#4f4a42"/>
  <path d="M34 8 Q44 4 48 11 Q47 18 38 18 Q32 14 34 8 Z" fill="#615a50"/>
  <g stroke="#3b362f" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M14 30 L20 36 L18 42"/>
    <path d="M50 16 L46 24"/>
    <path d="M28 54 L34 58"/>
  </g>
  <!-- sparse, thin seams -->
  <g stroke="#b8bcc4" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M18 46 L24 42"/>
    <path d="M44 14 L50 18"/>
  </g>
  <!-- two small nuggets is all you get -->
  <g fill="#cdd2da">
    <circle cx="24" cy="42" r="1.3"/>
    <circle cx="44" cy="14" r="1.1"/>
  </g>
</svg>
