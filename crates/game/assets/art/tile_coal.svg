<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- coal seam: fat glossy black bands in ashen stone (docs/03: the
       strong fuel, tier 1); edges stay base-colored so tiling is
       seamless -->
  <rect width="64" height="64" fill="#55524c"/>
  <path d="M8 10 Q18 5 24 12 Q26 20 16 22 Q7 20 8 10 Z" fill="#4c4944"/>
  <path d="M40 40 Q52 36 56 44 Q54 52 44 52 Q38 46 40 40 Z" fill="#4c4944"/>
  <path d="M34 8 Q44 4 48 11 Q47 18 38 18 Q32 14 34 8 Z" fill="#5e5b54"/>
  <g stroke="#3b3934" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M14 30 L20 36 L18 42"/>
    <path d="M50 16 L46 24"/>
  </g>
  <!-- the seams: thick, matte-black -->
  <g stroke="#26242a" stroke-width="3.4" stroke-linecap="round" fill="none">
    <path d="M10 46 L20 41 L30 45"/>
    <path d="M38 18 L48 22 L56 18"/>
  </g>
  <!-- chunks with an anthracite sheen -->
  <g fill="#2e2c33">
    <ellipse cx="20" cy="41" rx="2.6" ry="1.9"/>
    <ellipse cx="48" cy="22" rx="2.3" ry="1.7"/>
    <ellipse cx="30" cy="56" rx="2.0" ry="1.5"/>
  </g>
  <g stroke="#4a505e" stroke-width="1.0" stroke-linecap="round" fill="none">
    <path d="M19 40 L21 40.6"/>
    <path d="M47 21.3 L49 21.9"/>
  </g>
</svg>
