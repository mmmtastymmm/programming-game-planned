<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- grass: mottled green meadow; edges stay base-colored so tiling is seamless -->
  <rect width="64" height="64" fill="#335c38"/>
  <!-- darker mottling patches -->
  <path d="M10 12 Q18 8 24 14 Q26 22 18 24 Q10 24 10 12 Z" fill="#2c5030"/>
  <path d="M40 34 Q50 30 54 38 Q54 46 44 46 Q38 42 40 34 Z" fill="#2c5030"/>
  <path d="M14 44 Q22 40 26 46 Q26 54 18 54 Q12 52 14 44 Z" fill="#2f5434"/>
  <!-- lighter sun patches -->
  <path d="M34 10 Q44 6 48 12 Q48 20 38 20 Q32 16 34 10 Z" fill="#3a6840"/>
  <!-- grass tufts -->
  <g stroke="#4a7a4f" stroke-width="1.6" stroke-linecap="round" fill="none">
    <path d="M20 32 L18 27 M22 32 L22 26 M24 32 L26 28"/>
    <path d="M46 22 L44 17 M48 22 L48 16 M50 22 L52 18"/>
    <path d="M32 50 L30 45 M34 50 L34 44 M36 50 L38 46"/>
  </g>
  <!-- specks -->
  <g fill="#42714a">
    <circle cx="12" cy="30" r="1.2"/>
    <circle cx="54" cy="14" r="1.2"/>
    <circle cx="44" cy="54" r="1.2"/>
    <circle cx="28" cy="20" r="1.0"/>
    <circle cx="52" cy="50" r="1.0"/>
  </g>
</svg>
