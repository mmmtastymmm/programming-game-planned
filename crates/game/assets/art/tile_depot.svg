<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- depot pad: tech plate with a glowing blue drop-off slot -->
  <rect width="64" height="64" fill="#1a2028"/>
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#242c37" stroke-width="2"/>
  <!-- landing ring -->
  <rect x="8" y="8" width="48" height="48" rx="5" fill="none" stroke="#3d8cf2" stroke-width="2" opacity="0.75"/>
  <!-- deposit chevrons, dim -> bright toward the slot -->
  <g fill="none" stroke="#6fb3e8" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M24 16 L32 24 L40 16" opacity="0.35"/>
    <path d="M24 27 L32 35 L40 27" opacity="0.65"/>
    <path d="M24 38 L32 46 L40 38"/>
  </g>
  <!-- slot -->
  <rect x="20" y="50" width="24" height="5" rx="2" fill="#3d8cf2"/>
  <!-- corner dots -->
  <g fill="#314052">
    <circle cx="8" cy="8" r="2"/>
    <circle cx="56" cy="8" r="2"/>
    <circle cx="8" cy="56" r="2"/>
    <circle cx="56" cy="56" r="2"/>
  </g>
</svg>
