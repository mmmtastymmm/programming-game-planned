<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- water: deep blue with ripple crests; edges stay base-colored for seamless tiling -->
  <rect width="64" height="64" fill="#1a478c"/>
  <!-- depth patches -->
  <path d="M8 40 Q20 34 30 40 Q34 48 24 52 Q10 52 8 40 Z" fill="#153b78"/>
  <path d="M38 10 Q50 6 54 14 Q54 22 44 22 Q36 18 38 10 Z" fill="#173f80"/>
  <!-- ripple crests -->
  <g stroke="#2f6ab5" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M10 18 Q16 14 22 18 Q28 22 34 18"/>
    <path d="M30 32 Q36 28 42 32 Q48 36 54 32"/>
    <path d="M14 54 Q20 50 26 54"/>
  </g>
  <!-- sparkle highlights -->
  <g stroke="#4d87cc" stroke-width="1.4" stroke-linecap="round">
    <path d="M44 44 L48 44"/>
    <path d="M20 26 L23 26"/>
    <path d="M50 22 L53 22"/>
  </g>
</svg>
