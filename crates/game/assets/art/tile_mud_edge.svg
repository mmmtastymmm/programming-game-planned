<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- dried-crust rim for a mud tile's NORTH edge (build.rs rotates it onto
       whichever sides border firmer ground): a cracked dry lip over a damp
       band. Layers start and end at the same height so the crust tiles
       seamlessly across neighbors -->
  <path d="M0 0 H64 V6 Q54 9.5 44 6.5 Q34 3.5 24 7.5 Q14 11 0 6 Z" fill="#6b5637"/>
  <path d="M0 0 H64 V2.5 Q48 5 34 3 Q20 1 0 2.5 Z" fill="#80693f"/>
  <!-- shrinkage cracks in the crust -->
  <g stroke="#3f311d" stroke-width="1.1" stroke-linecap="round" fill="none">
    <path d="M12 2 L14 5.5 L12 8.5"/>
    <path d="M30 1.5 L29 5"/>
    <path d="M46 2 L48 5 L47 7.5"/>
    <path d="M58 3 L56 6"/>
  </g>
</svg>
