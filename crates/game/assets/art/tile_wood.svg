<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- wood: a grove seen from above (docs/03: the flagship regenerating
       node — renewable but thin) — round canopies over dark forest floor;
       edges stay base-colored so tiling is seamless -->
  <rect width="64" height="64" fill="#2b4a2e"/>
  <!-- floor litter -->
  <path d="M36 46 Q46 42 52 48 Q51 56 42 56 Q34 52 36 46 Z" fill="#254026"/>
  <path d="M6 30 Q14 26 18 32 Q17 39 10 39 Q4 36 6 30 Z" fill="#254026"/>
  <!-- big canopy: shadow, crown, sunlit lobes -->
  <ellipse cx="22" cy="21" rx="11.5" ry="10" fill="#21391f"/>
  <path d="M13 18 Q13 10 22 10 Q31 10 31 18 Q31 26 22 26 Q13 26 13 18 Z" fill="#3f7046"/>
  <path d="M16 15 Q18 11 23 12 Q27 12 28 16 Q25 14 21 14 Q18 14 16 15 Z" fill="#4c8052"/>
  <!-- second canopy -->
  <ellipse cx="45" cy="34" rx="10" ry="8.5" fill="#21391f"/>
  <path d="M37 32 Q37 25 45 25 Q53 25 53 32 Q53 39 45 39 Q37 39 37 32 Z" fill="#3f7046"/>
  <path d="M40 29 Q42 26 46 26.5 Q50 27 51 30 Q48 28 44 28 Q41 28 40 29 Z" fill="#4c8052"/>
  <!-- sapling -->
  <ellipse cx="17" cy="48" rx="5.5" ry="4.5" fill="#21391f"/>
  <circle cx="17" cy="46" r="4.5" fill="#457a4b"/>
  <path d="M14.5 44.5 Q16 42.8 18.5 43.2 Q17 43.8 15.5 45 Z" fill="#54885a"/>
  <!-- fallen leaves / undergrowth specks -->
  <g fill="#3a6340">
    <circle cx="56" cy="12" r="1.3"/>
    <circle cx="34" cy="58" r="1.1"/>
    <circle cx="8" cy="56" r="1.1"/>
    <circle cx="58" cy="52" r="1.0"/>
  </g>
</svg>
