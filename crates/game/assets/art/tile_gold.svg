<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- gold vein: rich seams in deep dark rock (docs/03: rare raid bait —
       high value per unit of cargo). Gold matches the ORE_GOLD gem
       palette; edges stay base-colored so tiling is seamless -->
  <rect width="64" height="64" fill="#46413a"/>
  <path d="M8 10 Q18 5 24 12 Q26 20 16 22 Q7 20 8 10 Z" fill="#3d3931"/>
  <path d="M40 40 Q52 36 56 44 Q54 52 44 52 Q38 46 40 40 Z" fill="#3d3931"/>
  <path d="M34 8 Q44 4 48 11 Q47 18 38 18 Q32 14 34 8 Z" fill="#4f4941"/>
  <g stroke="#2f2b24" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M14 30 L20 36 L18 42"/>
    <path d="M50 16 L46 24"/>
  </g>
  <!-- gold seams -->
  <g stroke="#d9a441" stroke-width="2.2" stroke-linecap="round" fill="none">
    <path d="M10 48 L18 43 L26 47 L34 41"/>
    <path d="M42 20 L48 24 L55 20"/>
  </g>
  <!-- nuggets, sparkling -->
  <g fill="#e8b84f">
    <circle cx="18" cy="43" r="1.9"/>
    <circle cx="48" cy="24" r="1.7"/>
    <circle cx="34" cy="41" r="1.4"/>
  </g>
  <g fill="#f6d47c">
    <circle cx="18.6" cy="42.4" r="0.7"/>
    <circle cx="48.5" cy="23.4" r="0.6"/>
  </g>
  <g stroke="#ffffff" stroke-width="0.9" stroke-linecap="round" fill="none">
    <path d="M16.8 43 L19.2 43"/>
    <path d="M18 41.8 L18 44.2"/>
  </g>
