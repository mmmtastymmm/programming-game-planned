  <path d="M8 14 Q19 7 26 15 Q28 23 17 24 Q7 22 8 14 Z" fill="#f7fbff"/>
  <path d="M36 36 Q49 30 54 38 Q53 47 42 47 Q34 42 36 36 Z" fill="#f7fbff"/>
