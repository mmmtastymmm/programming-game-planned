<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- rubble: low broken rock you drive over (top-down, no peaks). Angular
       chunks + grit; edges stay base-colored so the block top tiles clean. -->
  <rect width="64" height="64" fill="#565a63"/>
  <!-- large angular chunks (lit facet + shaded facet) -->
  <polygon points="14,12 26,10 30,20 22,26 12,22" fill="#6b6f79"/>
  <polygon points="22,26 12,22 14,12 30,20" fill="#4d515a" opacity="0.45"/>
  <polygon points="40,30 52,28 55,40 45,44 38,38" fill="#666a74"/>
  <polygon points="45,44 38,38 40,30 55,40" fill="#494d56" opacity="0.45"/>
  <polygon points="12,42 24,40 28,52 18,56 9,50" fill="#63676f"/>
  <polygon points="46,10 56,12 54,20 44,20" fill="#5e626b"/>
  <!-- grit / small stones -->
  <g fill="#6f737e">
    <ellipse cx="36" cy="14" rx="2.2" ry="1.6"/>
    <ellipse cx="8" cy="32" rx="2" ry="1.4"/>
    <ellipse cx="54" cy="54" rx="2.4" ry="1.7"/>
    <ellipse cx="30" cy="46" rx="1.8" ry="1.3"/>
  </g>
  <g fill="#4a4e57">
    <ellipse cx="20" cy="34" rx="1.6" ry="1.1"/>
    <ellipse cx="48" cy="22" rx="1.4" ry="1"/>
    <ellipse cx="34" cy="58" rx="1.6" ry="1.1"/>
  </g>
  <!-- cracks -->
  <g stroke="#3f434b" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M4 20 L14 24 L18 34"/>
    <path d="M60 32 L50 36 L52 46"/>
  </g>
</svg>
