<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- mud: wet brown bog that slows walkers 3x, loaded haulers 4x; edges
       stay base-colored so tiling is seamless -->
  <rect width="64" height="64" fill="#4a3a26"/>
  <!-- standing-water puddles -->
  <path d="M10 14 Q20 8 26 15 Q28 23 18 25 Q9 23 10 14 Z" fill="#382b1a"/>
  <path d="M38 36 Q50 31 54 39 Q53 47 43 47 Q36 42 38 36 Z" fill="#382b1a"/>
  <path d="M14 46 Q22 42 27 47 Q26 55 18 55 Q11 52 14 46 Z" fill="#3f311d"/>
  <!-- drier hummock -->
  <path d="M34 10 Q44 6 48 13 Q47 20 38 20 Q32 16 34 10 Z" fill="#57452c"/>
  <!-- wet sheen on the puddles -->
  <g stroke="#7a6543" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M13 17 Q17 15 21 17"/>
    <path d="M42 40 Q46 38 50 40"/>
  </g>
  <!-- bog bubbles -->
  <g fill="none" stroke="#5e4b30" stroke-width="1.2">
    <circle cx="22" cy="21" r="1.6"/>
    <circle cx="47" cy="43" r="1.4"/>
    <circle cx="20" cy="51" r="1.3"/>
  </g>
  <!-- specks -->
  <g fill="#5a4830">
    <circle cx="54" cy="18" r="1.2"/>
    <circle cx="30" cy="30" r="1.1"/>
    <circle cx="8" cy="34" r="1.1"/>
    <circle cx="58" cy="54" r="1.0"/>
  </g>
</svg>
