<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- high ground: a dry, walkable plateau top — lighter and flatter than
       the mountain summits it overlooks (its sides reuse rock_face, like
       the mountain block); edges stay base-colored so tiling is seamless -->
  <rect width="64" height="64" fill="#6b6555"/>
  <!-- weathered mottling -->
  <path d="M10 12 Q20 7 26 14 Q28 22 18 24 Q9 22 10 12 Z" fill="#5f594a"/>
  <path d="M38 36 Q50 32 54 40 Q53 48 43 48 Q36 42 38 36 Z" fill="#5f594a"/>
  <path d="M32 8 Q42 4 46 11 Q45 18 36 18 Q30 14 32 8 Z" fill="#7a7462"/>
  <!-- bedrock cracks -->
  <g stroke="#514c3e" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M14 34 L20 38 L18 46"/>
    <path d="M46 18 L42 26 L46 30"/>
    <path d="M28 52 L34 50"/>
  </g>
  <!-- scattered stones -->
  <g fill="#7d7663">
    <circle cx="22" cy="30" r="1.6"/>
    <circle cx="50" cy="52" r="1.5"/>
    <circle cx="12" cy="52" r="1.3"/>
    <circle cx="56" cy="12" r="1.4"/>
  </g>
  <g fill="#565040">
    <ellipse cx="30" cy="28" rx="2.2" ry="1.4"/>
    <ellipse cx="52" cy="34" rx="1.8" ry="1.2"/>
  </g>
</svg>
