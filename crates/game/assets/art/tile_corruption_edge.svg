<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- creep fringe for a corruption tile's NORTH edge (build.rs rotates it
       onto whichever sides border clean land): a scorched frontier band
       with tendrils curling back into the zone. Layers start and end at
       the same height so the creep runs seamlessly along a front -->
  <path d="M0 0 H64 V5 Q53 9 42 6 Q31 3 20 7 Q10 10.5 0 5 Z" fill="#3a1b52"/>
  <path d="M0 0 H64 V2 Q48 4.5 32 2.5 Q16 0.5 0 2 Z" fill="#4e2570"/>
  <!-- tendrils -->
  <g stroke="#6d2fa0" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M10 6.5 Q12 10.5 9 13.5"/>
    <path d="M28 6 Q31 9 29 13"/>
    <path d="M46 7 Q44 11 47 14"/>
    <path d="M59 5 Q61 8 59 11"/>
  </g>
  <!-- motes at the tendril tips -->
  <g fill="#b366e0">
    <circle cx="9" cy="14.5" r="0.9"/>
    <circle cx="29" cy="14" r="0.8"/>
    <circle cx="47" cy="15" r="0.9"/>
  </g>
</svg>
