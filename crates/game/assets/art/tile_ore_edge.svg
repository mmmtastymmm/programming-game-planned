<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- broken-rock fringe for an ore tile's NORTH edge (build.rs rotates it
       onto whichever sides meet plain ground): a rubble lip where the
       outcrop surfaces, with a couple of stray glints. Layers start and
       end at the same height so the lip runs seamlessly along a vein -->
  <path d="M0 0 H64 V6 Q54 9 44 6.5 Q34 4 24 8 Q14 11.5 0 6 Z" fill="#5c5342"/>
  <path d="M0 0 H64 V2.5 Q50 5 36 3 Q22 1 0 2.5 Z" fill="#6e6450"/>
  <!-- broken chunks -->
  <g fill="#4a4234">
    <ellipse cx="12" cy="8" rx="2.2" ry="1.5"/>
    <ellipse cx="34" cy="9" rx="1.9" ry="1.3"/>
    <ellipse cx="52" cy="8" rx="2.0" ry="1.4"/>
  </g>
  <!-- glints -->
  <g fill="#e8b84f">
    <circle cx="24" cy="7" r="0.9"/>
    <circle cx="58" cy="9" r="0.8"/>
  </g>
</svg>
