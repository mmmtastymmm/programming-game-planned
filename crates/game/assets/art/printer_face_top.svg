<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- printer top: the paper slot the sheet mesh rises from (image-up is
       the printer's front). -->
  <rect width="64" height="64" fill="#3a4454"/>
  <!-- status lights on the front lip -->
  <circle cx="10" cy="8" r="2" fill="#39d98a"/>
  <circle cx="17" cy="8" r="2" fill="#242c37"/>
  <!-- recessed slot housing -->
  <rect x="8" y="16" width="48" height="22" rx="2" fill="#2c3542" stroke="#0e1116" stroke-width="2"/>
  <!-- the slot itself -->
  <rect x="13" y="23" width="38" height="8" rx="2" fill="#0e1116"/>
  <!-- paper edge visible in the slot -->
  <rect x="16" y="25" width="32" height="4" fill="#eef0e9"/>
  <!-- feed rollers behind the slot -->
  <circle cx="20" cy="44" r="2" fill="#242c37"/>
  <circle cx="32" cy="44" r="2" fill="#242c37"/>
  <circle cx="44" cy="44" r="2" fill="#242c37"/>
  <!-- rear vent -->
  <rect x="16" y="52" width="32" height="4" rx="2" fill="#2c3542"/>
  <g fill="#242c37">
    <circle cx="7" cy="57" r="2"/>
    <circle cx="57" cy="57" r="2"/>
    <circle cx="57" cy="7" r="2"/>
  </g>
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#0e1116" stroke-width="2"/>
</svg>
