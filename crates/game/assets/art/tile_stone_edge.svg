<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- slab lip for a stone tile's NORTH edge (build.rs rotates it onto
       whichever sides meet plain ground): a broken ledge over a shadow
       band, chips scattering off it. Matched endpoints so the ledge runs
       seamlessly along an outcrop -->
  <path d="M0 0 H64 V6 Q54 9 44 6.5 Q34 4 24 8 Q14 11.5 0 6 Z" fill="#6a6d74"/>
  <path d="M0 0 H64 V2.5 Q50 5 36 3 Q22 1 0 2.5 Z" fill="#8f929a"/>
  <!-- broken chips at the ledge -->
  <g fill="#5f626a">
    <ellipse cx="12" cy="8" rx="2.2" ry="1.5"/>
    <ellipse cx="34" cy="9" rx="1.9" ry="1.3"/>
    <ellipse cx="52" cy="8" rx="2.0" ry="1.4"/>
  </g>
  <g fill="#9a9da5">
    <circle cx="24" cy="7" r="0.9"/>
    <circle cx="58" cy="9" r="0.8"/>
  </g>
</svg>
