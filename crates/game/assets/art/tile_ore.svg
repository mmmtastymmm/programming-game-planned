<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- ore vein: fractured stone shot through with gold seams (the gold
       matches ORE_GOLD gems); edges stay base-colored so tiling is
       seamless -->
  <rect width="64" height="64" fill="#4d4537"/>
  <!-- stone mottling -->
  <path d="M8 10 Q18 5 24 12 Q26 20 16 22 Q7 20 8 10 Z" fill="#443c2f"/>
  <path d="M40 40 Q52 36 56 44 Q54 52 44 52 Q38 46 40 40 Z" fill="#443c2f"/>
  <path d="M34 8 Q44 4 48 11 Q47 18 38 18 Q32 14 34 8 Z" fill="#564d3d"/>
  <!-- fracture lines -->
  <g stroke="#332c21" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M14 30 L20 36 L18 42"/>
    <path d="M50 16 L46 24"/>
    <path d="M28 54 L34 58"/>
  </g>
  <!-- gold seams -->
  <g stroke="#d9a441" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M10 48 L18 42 L26 46 L34 40"/>
    <path d="M40 22 L46 26 L54 22"/>
  </g>
  <!-- nuggets -->
  <g fill="#e8b84f">
    <circle cx="18" cy="42" r="1.8"/>
    <circle cx="46" cy="26" r="1.6"/>
    <circle cx="34" cy="40" r="1.4"/>
  </g>
  <g fill="#f6d47c">
    <circle cx="18.6" cy="41.4" r="0.7"/>
    <circle cx="46.5" cy="25.5" r="0.6"/>
  </g>
</svg>
