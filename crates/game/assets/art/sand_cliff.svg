<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- dune cliff face: wind-layered sand strata, bands run edge to edge so
       adjacent dune blocks tile seamlessly. Sand palette (matches tile_sand). -->
  <rect width="64" height="64" fill="#cdb47f"/>
  <path d="M0 12 L16 15 L34 11 L50 15 L64 12 L64 22 L48 25 L30 21 L14 25 L0 22 Z" fill="#c0a771"/>
  <path d="M0 32 L18 35 L36 31 L52 35 L64 32 L64 40 L46 43 L26 39 L10 43 L0 40 Z" fill="#dac495"/>
  <path d="M0 50 L16 53 L34 49 L50 53 L64 50 L64 60 L44 63 L24 59 L8 63 L0 60 Z" fill="#c0a771"/>
  <!-- top seat shadow, under the dune crest -->
  <rect width="64" height="4" fill="#b39c68"/>
  <!-- wind grooves -->
  <g stroke="#b39c68" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M18 6 L20 16 L17 26"/>
    <path d="M44 24 L42 34 L45 44"/>
  </g>
  <!-- embedded pebbles -->
  <g fill="#e6d6a6">
    <ellipse cx="12" cy="29" rx="2.2" ry="1.5"/>
    <ellipse cx="52" cy="46" rx="2" ry="1.4"/>
  </g>
</svg>
