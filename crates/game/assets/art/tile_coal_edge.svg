    <ellipse cx="12" cy="8" rx="2.2" ry="1.5"/>
    <ellipse cx="34" cy="9" rx="1.9" ry="1.3"/>
    <ellipse cx="52" cy="8" rx="2.0" ry="1.4"/>
  </g>
  <g stroke="#4a505e" stroke-width="0.9" stroke-linecap="round" fill="none">
    <path d="M11 7.4 L13 7.9"/>
    <path d="M51 7.4 L53 7.9"/>
