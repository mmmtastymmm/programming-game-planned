<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- one-way tile: ground base, amber chevrons brightening toward travel direction (east; rotate in-engine) -->
  <rect width="64" height="64" fill="#1a2028"/>
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#242c37" stroke-width="2"/>
  <!-- lane edges -->
  <rect x="2" y="8" width="60" height="2" fill="#26303d"/>
  <rect x="2" y="54" width="60" height="2" fill="#26303d"/>
  <!-- chevrons, dim -> bright along travel direction -->
  <g fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20 L22 32 L12 44" stroke="#f2b23e" opacity="0.35"/>
    <path d="M26 20 L36 32 L26 44" stroke="#f2b23e" opacity="0.65"/>
    <path d="M40 20 L50 32 L40 44" stroke="#f2b23e"/>
  </g>
  <!-- corner rivets -->
  <g fill="#242c37">
    <circle cx="6" cy="6" r="2"/>
    <circle cx="58" cy="6" r="2"/>
    <circle cx="6" cy="58" r="2"/>
    <circle cx="58" cy="58" r="2"/>
  </g>
</svg>
