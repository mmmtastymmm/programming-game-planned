<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- bridge tile: planks over the void, glowing edge rails -->
  <rect width="64" height="64" fill="#0a0d12"/>
  <!-- planks -->
  <g>
    <rect x="0" y="6" width="64" height="10" rx="2" fill="#3a4454" stroke="#0e1116" stroke-width="1.5"/>
    <rect x="0" y="19" width="64" height="10" rx="2" fill="#333c4b" stroke="#0e1116" stroke-width="1.5"/>
    <rect x="0" y="32" width="64" height="10" rx="2" fill="#3a4454" stroke="#0e1116" stroke-width="1.5"/>
    <rect x="0" y="45" width="64" height="10" rx="2" fill="#333c4b" stroke="#0e1116" stroke-width="1.5"/>
  </g>
  <!-- bolts -->
  <g fill="#1c232c">
    <circle cx="8" cy="11" r="1.8"/><circle cx="56" cy="11" r="1.8"/>
    <circle cx="8" cy="24" r="1.8"/><circle cx="56" cy="24" r="1.8"/>
    <circle cx="8" cy="37" r="1.8"/><circle cx="56" cy="37" r="1.8"/>
    <circle cx="8" cy="50" r="1.8"/><circle cx="56" cy="50" r="1.8"/>
  </g>
  <!-- glowing rails on the walking edges -->
  <rect x="0" y="0" width="64" height="4" fill="#39d98a"/>
  <rect x="0" y="60" width="64" height="4" fill="#39d98a"/>
  <rect x="0" y="4" width="64" height="1.5" fill="#1c6b45"/>
  <rect x="0" y="58.5" width="64" height="1.5" fill="#1c6b45"/>
</svg>
